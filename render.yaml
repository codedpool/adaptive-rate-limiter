# Render blueprint — one-click deploy, no env vars to set.
#
# Provisions a Node web service + a managed Redis (Render "Key Value"), and wires
# the connection string into the app automatically. The dashboard, API, metrics,
# and WebSocket all run on the one web service (UI served from "/").
#
# Note on naming: Render rebranded "Redis" to "Key Value". The `type: redis`
# blueprint syntax below still provisions it. If your workspace rejects it, change
# `type: redis` -> `type: keyvalue` and `fromService` -> `fromKeyValue`.
services:
  - type: web
    name: adaptive-rate-limiter
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: '20'
      - key: RL_ADMIN_TOKEN
        generateValue: true # protects /admin/* with a generated bearer token
      - key: REDIS_URL # injected from the Key Value instance below
        fromService:
          type: redis
          name: rate-limiter-kv
          property: connectionString

  # Managed Redis / Key Value. Free tier is fine for rate limiting (keys are
  # small, TTL'd, and eviction-safe).
  - type: redis
    name: rate-limiter-kv
    plan: free
    ipAllowList: [] # empty = internal connections only (from your Render services)
    maxmemoryPolicy: allkeys-lru
